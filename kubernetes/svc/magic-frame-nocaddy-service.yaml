apiVersion: v1
kind: Service
metadata:
  name: magic-frame-nocaddy
  namespace: magic-frame
spec:
  type: NodePort
  selector:
    app: magic-frame-app
  ports:
    - protocol: TCP
      name: "80"
      port: 3080
      targetPort: 3000
      nodePort: 30080
    - protocol: TCP
      name: "443"
      port: 3443
      targetPort: 3000
      nodePort: 30443