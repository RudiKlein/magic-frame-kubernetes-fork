# Toggle Caddy deployment and related configs on or off
caddy:
  enabled: false

# Application Image Settings
image:
  repository: magic-frame-app
  tag: latest
  pullPolicy: Never

# nodePort Settings (external access). Change to your needs!
nodePorts:
  http_port: 30080
  https_port: 30443
  caddy_port: 32019

# Environment Variables
appConfig:
  # --- Public Configuration (ConfigMap) ---
  adminEmail: ""
  appBaseUrl: ""
  caddyAdminUrl: "http://magic-frame-caddy:2019"
  cookieSecure: ""
  googleClientId: ""
  msClientId: ""
  nodeEnv: "production"

  # --- Database Configuration ---
  dbHost: "magic-frame-db"
  dbPort: "5432"
  dbName: "magicdashboard"
  dbUser: "postgres"

  # --- Sensitive Credentials (Kubernetes Secret) ---
  adminPassword: ""
  dbPassword: "YOUR_SECURE_PASSWORD_HERE"
  googleClientSecret: ""
  msClientSecret: ""
  openWeatherMapApiKey: ""
  sessionSecret: "GENERATED_SECRET_HERE"

# Persistent Storage Configurations
storage:
  className: "magic-frame-storage"
  capacity: "100Mi"
  # Base path for hostPath volumes
  hostPathBase: "/var/lib/rancher/k3s/storage"