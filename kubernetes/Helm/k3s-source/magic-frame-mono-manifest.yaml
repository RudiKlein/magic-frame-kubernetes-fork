# Original filename: magic-frame-db-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: magic-frame-db
  name: magic-frame-db
  namespace: magic-frame
spec:
  replicas: 1
  selector:
    matchLabels:
      app: magic-frame-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: magic-frame-db
    spec:
      containers:
        - env:
            - name: POSTGRES_DB
              value: magicdashboard
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_USER
              value: postgres
          image: postgres:16-alpine
          livenessProbe:
            exec:
              command:
                - pg_isready -U postgres
            failureThreshold: 5
            periodSeconds: 5
            timeoutSeconds: 5
          name: magic-frame-db
          ports:
            - containerPort: 5432
              protocol: TCP
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: magic-frame-pgdata-pvc
      restartPolicy: Always
      volumes:
        - name: magic-frame-pgdata-pvc
          persistentVolumeClaim:
            claimName: magic-frame-pgdata-pvc
---
# Original filename: magic-frame-db-service.yaml
apiVersion: v1
kind: Service
metadata:
  labels:
    app: magic-frame-db
  name: magic-frame-db
  namespace: magic-frame
spec:
  type: ClusterIP
  ports:
    - name: db-port
      protocol: TCP
      port: 5432
      targetPort: 5432
  selector:
    app: magic-frame-db
---
